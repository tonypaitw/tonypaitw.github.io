<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Pai 工程師工具箱</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px 0; color: var(--primary-color); }
        
        /* 網格佈局：手機 1 欄，電腦 3 欄 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: var(--accent-color); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* 計算器內部樣式 */
        input { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: var(--accent-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .result { margin-top: 15px; padding: 10px; background: #e8f4fd; border-radius: 4px; font-size: 0.9em; color: #2c3e50; line-height: 1.5; }
        
        .placeholder { color: #999; font-style: italic; text-align: center; padding-top: 40px; }
    </style>
</head>
<body>

<div class="header">
    <h1>Tony Pai 的工程師工具箱</h1>
    <p>專業維修與自動化計算工具集</p>
</div>

<div class="grid-container">
    <div class="card">
        <h3>1. 消毒濃度計算</h3>
        <label>原始濃度 (%)：</label>
        <input type="number" id="origin" value="6" step="0.1">
        <label>目標濃度 (ppm)：</label>
        <input type="number" id="target" value="500">
        <label>總水量 (公升)：</label>
        <input type="number" id="water" value="10">
        <button onclick="calcBleach()">立即計算</button>
        <div id="output" class="result" style="display:none;"></div>
    </div>

    <div class="card">
        <h3>2. RO 系統壓力計算</h3>
        <div class="placeholder">待開發：計算逆滲透膜所需壓力</div>
    </div>

    <div class="card">
        <h3>3. Arduino 電阻計算</h3>
        <div class="placeholder">待開發：色碼電阻與分壓計算</div>
    </div>

    <div class="card">
        <h3>4. 維修備忘錄</h3>
        <div class="placeholder">待開發：常用備件規格表</div>
    </div>

    <div class="card">
        <h3>5. 單位換算器</h3>
        <div class="placeholder">待開發：壓力、流量單位轉換</div>
    </div>

    <div class="card">
        <h3>6. 故障排除清單</h3>
        <div class="placeholder">待開發：標準操作程序 (SOP)</div>
    </div>
</div>

<script>
    function calcBleach() {
        const originPct = document.getElementById('origin').value;
        const targetPpm = document.getElementById('target').value;
        const waterL = document.getElementById('water').value;
        
        // 公式：(目標ppm * 水量L) / (原始濃度% * 10)
        const bleachMl = (targetPpm * waterL) / (originPct * 10);
        
        const output = document.getElementById('output');
        output.style.display = 'block';
        output.innerHTML = `
            <strong>計算結果：</strong><br>
            • 需加入漂白水：<strong>${bleachMl.toFixed(1)}</strong> ml<br>
            • 加入清水至：<strong>${waterL}</strong> 公升<br>
            <small>*適用於一般環境消毒配製</small>
        `;
    }
</script>

</body>
</html>
