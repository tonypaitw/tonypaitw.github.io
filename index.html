<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony Pai 工程工具箱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
        }
        * { box-sizing: border-box; }
        body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: auto;
        }

        .tool-card {
            background: white;
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: var(--primary);
            border: 1px solid #eee;
        }
        .tool-card:hover { transform: scale(1.05); border-color: var(--accent); }
        .icon { font-size: 40px; margin-bottom: 10px; }
        .title { font-weight: bold; font-size: 14px; text-align: center; padding: 0 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tony Pai 工具箱</h1>
        <p>維修工程師專用手冊</p>
    </div>

    <div class="grid">
        <a href="bleach_calculator.html" class="tool-card">
            <div class="icon">🧪</div>
            <div class="title">消毒濃度計算</div>
        </a>

        <a href="peplt.html" class="tool-card">
            <div class="icon">💧</div>
            <div class="title">軟管壓損評估</div>
        </a>

        <div class="tool-card">
            <div class="icon">🤖</div>
            <div class="title">Arduino 控制</div>
        </div>

        <div class="tool-card">
            <div class="icon">📦</div>
            <div class="title">零件規格</div>
        </div>

        <div class="tool-card">
            <div class="icon">🛠️</div>
            <div class="title">SOP 指南</div>
        </div>

        <div class="tool-card">
            <div class="icon">⚙️</div>
            <div class="title">系統設定</div>
        </div>
    </div>

</body>
</html>
